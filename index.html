<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini eCommerce</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Mini eCommerce</h1>
    <nav>
      <ul>
        <li>Mi perfil</li>
        <li>Iniciar sesión</li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="products">
      <article class="product-card">
        <h2>Camisa Casual</h2>
        <p class="category">Ropa</p>
        <span class="price">$25</span>
      </article>

      <article class="product-card">
        <h2>Auriculares Bluetooth</h2>
        <p class="category">Electrónica</p>
        <span class="price">$60</span>
      </article>

      <article class="product-card">
        <h2>Zapatillas Deportivas</h2>
        <p class="category">Zapatos</p>
        <span class="price">$80</span>
      </article>

      <article class="product-card">
        <h2>Reloj de Pulsera</h2>
        <p class="category">Accesorios</p>
        <span class="price">$45</span>
      </article>
    </section>
  </main>

  <aside>
    <h3>Categorías</h3>
    <ul>
      <li>Ropa</li>
      <li>Electrónica</li>
      <li>Zapatos</li>
      <li>Accesorios</li>
    </ul>
  </aside>

</body>
</html>
