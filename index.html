<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eCommerce</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>eCommerce</h1>
    <nav>
      <ul>
        <li>Mi perfil</li>
        <li>Iniciar sesión</li>
      </ul>
    </nav>
  </header>

  <section class="hero">
<div class="hero-content">
    <h2>Encuentra los mejores productos</h2>
    <p>Compra y vende fácil y seguro</p>
    <a href="#" class="hero-btn">Explorar ahora</a>
  </div>

  </section>
  

  <main>
    <section class="products">
      
    <article class="product-card">
      <h3>Camisa Casual</h3>
      <p class="category">Ropa</p>
      <span class="price">$25</span>
    </article>

    <article class="product-card">
      <h3>Auriculares Bluetooth</h3>
      <p class="category">Electrónica</p>
      <span class="price">$60</span>
    </article>

    <article class="product-card">
      <h3>Zapatillas Deportivas</h3>
      <p class="category">Zapatos</p>
      <span class="price">$80</span>
    </article>

    <article class="product-card">
      <h3>Reloj de Pulsera</h3>
      <p class="category">Accesorios</p>
      <span class="price">$45</span>
    </article>
    </section>
  </main>

</body>
</html>
